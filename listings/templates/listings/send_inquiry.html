{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <h2>Send Inquiry for {{ property.name }}</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="btn btn-success">
            Send Inquiry
        </button>
    </form>
</div>
{% endblock %}
